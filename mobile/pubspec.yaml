name: mf_agent_mobile
description: "MF Agent - Sistema de Gestión Móvil"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.6
  firebase_auth: ^5.5.2

  # Estado y navegación
  provider: ^6.1.2
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1

  # Utilidades
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  image_picker: ^1.1.2
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  device_info_plus: ^11.4.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
